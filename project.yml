name: SFlow
options:
  bundleIdPrefix: com.filip
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
targets:
  SFlow:
    type: application
    platform: macOS
    sources: [SFlow]
    info:
      path: SFlow/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSAccessibilityUsageDescription: SFlow reads UI element names to detect when you click something that has a keyboard shortcut.
        NSInputMonitoringUsageDescription: SFlow monitors mouse clicks to detect when you click instead of using a keyboard shortcut.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filip.sflow
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Z8R9KWPK32
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
  SFlowTests:
    type: bundle.unit-test
    platform: macOS
    sources: [SFlowTests]
    dependencies:
      - target: SFlow
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.filip.sflow-tests
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/SFlow.app/Contents/MacOS/SFlow
      BUNDLE_LOADER: $(TEST_HOST)
      SWIFT_VERSION: "5.9"
